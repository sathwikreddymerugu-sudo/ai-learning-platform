<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mid Exam Prep - AI Learn</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">
<nav class="border-b border-gray-800 px-6 py-4 flex justify-between items-center">
  <a href="index.html" class="text-xl font-bold text-purple-400">🤖 AI Learn</a>
  <span class="text-gray-400 text-sm">Mid Exam Prep</span>
</nav>
<div class="max-w-2xl mx-auto px-6 py-12">
  <h2 class="text-3xl font-bold mb-2">📝 Mid Exam Prep</h2>
  <p class="text-gray-400 mb-8">Quick revision notes and scoring points</p>
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 mb-6">
    <div class="mb-4">
      <label class="block text-sm text-gray-400 mb-2">Subject</label>
      <input id="subject" type="text" placeholder="e.g. Physics, Chemistry"
        class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-500"/>
    </div>
    <div class="mb-6">
      <label class="block text-sm text-gray-400 mb-2">Topic</label>
      <input id="topic" type="text" placeholder="e.g. Thermodynamics, Organic Chemistry"
        class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-500"/>
    </div>
    <button onclick="generateMidExam()"
      class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-xl transition">
      Generate Mid Exam Prep ✨
    </button>
  </div>
  <div id="loading" class="hidden text-center py-8">
    <div class="text-purple-400 text-lg">🤖 Generating your revision notes...</div>
  </div>
  <div id="results" class="hidden space-y-4"></div>
</div>
<script>
async function generateMidExam() {
  const subject = document.getElementById('subject').value;
  const topic = document.getElementById('topic').value;
  if (!subject || !topic) { alert('Please fill in all fields!'); return; }
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('results').classList.add('hidden');
  try {
    const response = await fetch('https://my-n8n-wad4.onrender.com/webhook/mid-exam', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subject, topic })
    });
    const data = await response.json();
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('results').innerHTML = `
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
        <h3 class="text-lg font-semibold text-purple-400 mb-4">📒 Concise Notes</h3>
        <ul class="space-y-2">
          ${(data.data?.conciseNotes || []).map(n => `<li class="text-gray-300">• ${n}</li>`).join('')}
        </ul>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
        <h3 class="text-lg font-semibold text-purple-400 mb-4">🎯 Scoring Points</h3>
        <ul class="space-y-2">
          ${(data.data?.scoringPoints || []).map(p => `<li class="text-gray-300">• ${p}</li>`).join('')}
        </ul>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
        <h3 class="text-lg font-semibold text-purple-400 mb-4">⚡ Quick Revision</h3>
        <p class="text-gray-300">${data.data?.quickRevision || ''}</p>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
        <h3 class="text-lg font-semibold text-purple-400 mb-4">❓ Expected Questions</h3>
        <ol class="space-y-2">
          ${(data.data?.expectedQuestions || []).map((q,i) => `
            <li class="text-gray-300"><span class="text-purple-400 font-semibold">${i+1}.</span> ${q}</li>
          `).join('')}
        </ol>
      </div>
    `;
  } catch(e) {
    document.getElementById('loading').classList.add('hidden');
    alert('Error! Please try again.');
  }
}
</script>
</body>
</html>

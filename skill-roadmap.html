<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Roadmap - AI Learn</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">
<nav class="border-b border-gray-800 px-6 py-4 flex justify-between items-center">
  <a href="index.html" class="text-xl font-bold text-purple-400">🤖 AI Learn</a>
  <span class="text-gray-400 text-sm">Skill Roadmap</span>
</nav>
<div class="max-w-2xl mx-auto px-6 py-12">
  <h2 class="text-3xl font-bold mb-2">🗺️ Skill Roadmap</h2>
  <p class="text-gray-400 mb-8">Get AI-era learning path for any skill</p>
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 mb-6">
    <div class="mb-6">
      <label class="block text-sm text-gray-400 mb-2">Select Skill</label>
      <select id="skill" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-500">
        <option value="Web Development">Web Development</option>
        <option value="AI/ML">AI/ML</option>
        <option value="Data Science">Data Science</option>
        <option value="App Development">App Development</option>
        <option value="Cybersecurity">Cybersecurity</option>
        <option value="DevOps">DevOps</option>
        <option value="Cloud Computing">Cloud Computing</option>
        <option value="DSA">DSA</option>
      </select>
    </div>
    <button onclick="generateRoadmap()"
      class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-xl transition">
      Generate Roadmap ✨
    </button>
  </div>
  <div id="loading" class="hidden text-center py-8">
    <div class="text-purple-400 text-lg">🤖 AI is generating your roadmap...</div>
  </div>
  <div id="results" class="hidden space-y-4"></div>
</div>
<script>
async function generateRoadmap() {
  const skill = document.getElementById('skill').value;
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('results').classList.add('hidden');
  try {
    const response = await fetch('https://my-n8n-wad4.onrender.com/webhook/skill-roadmap', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ skill })
    });
    const data = await response.json();
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('results').classList.remove('hidden');
    const results = document.getElementById('results');
    results.innerHTML = `
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
        <h3 class="text-lg font-semibold text-purple-400 mb-4">✅ What You Must Learn</h3>
        <ul class="space-y-2">
          ${(data.data?.mustLearn || []).map(item => `
            <li class="text-gray-300">• ${item}</li>
          `).join('')}
        </ul>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
        <h3 class="text-lg font-semibold text-purple-400 mb-4">🤖 What AI Can Handle</h3>
        <ul class="space-y-2">
          ${(data.data?.aiCanHandle || []).map(item => `
            <li class="text-gray-300">• ${item}</li>
          `).join('')}
        </ul>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
        <h3 class="text-lg font-semibold text-purple-400 mb-4">🛠️ AI Tools to Use</h3>
        <ul class="space-y-2">
          ${(data.data?.aiTools || []).map(item => `
            <li class="text-gray-300">• ${item}</li>
          `).join('')}
        </ul>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
        <h3 class="text-lg font-semibold text-purple-400 mb-4">💡 Project Ideas</h3>
        <ul class="space-y-2">
          ${(data.data?.projectIdeas || []).map(item => `
            <li class="text-gray-300">• ${typeof item === 'object' ? item.name || JSON.stringify(item) : item}</li>
          `).join('')}
        </ul>
      </div>
    `;
  } catch(e) {
    document.getElementById('loading').classList.add('hidden');
    alert('Error! Please try again.');
  }
}
</script>
</body>
</html>

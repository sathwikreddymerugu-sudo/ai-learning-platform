<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Assistant - AI Learn</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">
<nav class="border-b border-gray-800 px-6 py-4 flex justify-between items-center">
  <a href="index.html" class="text-xl font-bold text-purple-400">🤖 AI Learn</a>
  <span class="text-gray-400 text-sm">Study Assistant</span>
</nav>
<div class="max-w-2xl mx-auto px-6 py-12">
  <h2 class="text-3xl font-bold mb-2">💬 Study Assistant</h2>
  <p class="text-gray-400 mb-8">Ask any doubt and get instant answers</p>
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 mb-6">
    <div class="mb-4">
      <label class="block text-sm text-gray-400 mb-2">Your Question</label>
      <input id="question" type="text" placeholder="e.g. What is recursion?"
        class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-500"/>
    </div>
    <div class="mb-6">
      <label class="block text-sm text-gray-400 mb-2">Your Notes (optional)</label>
      <textarea id="notes" placeholder="Paste your notes here..."
        class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-500 h-32"></textarea>
    </div>
    <button onclick="askQuestion()"
      class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-xl transition">
      Ask AI Tutor ✨
    </button>
  </div>
  <div id="loading" class="hidden text-center py-8">
    <div class="text-purple-400 text-lg">🤖 AI is thinking...</div>
  </div>
  <div id="results" class="hidden space-y-4"></div>
</div>
<script>
async function askQuestion() {
  const question = document.getElementById('question').value;
  const notes = document.getElementById('notes').value;
  if (!question) { alert('Please enter a question!'); return; }
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('results').classList.add('hidden');
  try {
    const response = await fetch('https://my-n8n-wad4.onrender.com/webhook/study-assistant', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, notes })
    });
    const data = await response.json();
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('results').innerHTML = `
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
        <h3 class="text-lg font-semibold text-purple-400 mb-3">💡 Answer</h3>
        <p class="text-gray-300">${data.data?.answer || 'No answer available'}</p>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
        <h3 class="text-lg font-semibold text-purple-400 mb-3">🔑 Key Points</h3>
        <ul class="space-y-2">
          ${(data.data?.keyPoints || []).map(p => `<li class="text-gray-300">• ${p}</li>`).join('')}
        </ul>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
        <h3 class="text-lg font-semibold text-purple-400 mb-3">📚 Related Topics</h3>
        <ul class="space-y-2">
          ${(data.data?.relatedTopics || []).map(t => `<li class="text-gray-300">• ${t}</li>`).join('')}
        </ul>
      </div>
    `;
  } catch(e) {
    document.getElementById('loading').classList.add('hidden');
    alert('Error! Please try again.');
  }
}
</script>
</body>
</html>

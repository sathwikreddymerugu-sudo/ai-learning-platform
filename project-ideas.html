<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Ideas - AI Learn</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">
<nav class="border-b border-gray-800 px-6 py-4 flex justify-between items-center">
  <a href="index.html" class="text-xl font-bold text-purple-400">🤖 AI Learn</a>
  <span class="text-gray-400 text-sm">Project Ideas</span>
</nav>
<div class="max-w-2xl mx-auto px-6 py-12">
  <h2 class="text-3xl font-bold mb-2">🚀 Project Ideas</h2>
  <p class="text-gray-400 mb-8">AI-assisted project ideas for your skill level</p>
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 mb-6">
    <div class="mb-4">
      <label class="block text-sm text-gray-400 mb-2">Skill</label>
      <select id="skill" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-500">
        <option value="Python">Python</option>
        <option value="Web Development">Web Development</option>
        <option value="AI/ML">AI/ML</option>
        <option value="App Development">App Development</option>
        <option value="Data Science">Data Science</option>
        <option value="Cybersecurity">Cybersecurity</option>
        <option value="DevOps">DevOps</option>
      </select>
    </div>
    <div class="mb-6">
      <label class="block text-sm text-gray-400 mb-2">Level</label>
      <select id="level" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-500">
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
      </select>
    </div>
    <button onclick="generateProjects()"
      class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-xl transition">
      Generate Project Ideas ✨
    </button>
  </div>
  <div id="loading" class="hidden text-center py-8">
    <div class="text-purple-400 text-lg">🤖 Generating project ideas...</div>
  </div>
  <div id="results" class="hidden space-y-4"></div>
</div>
<script>
async function generateProjects() {
  const skill = document.getElementById('skill').value;
  const level = document.getElementById('level').value;
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('results').classList.add('hidden');
  try {
    const response = await fetch('https://my-n8n-wad4.onrender.com/webhook/project-ideas', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ skill, level })
    });
    const data = await response.json();
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('results').innerHTML = (data.data?.projects || []).map((p, i) => `
      <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
        <div class="flex justify-between items-start mb-3">
          <h3 class="text-lg font-semibold text-white">${i+1}. ${p.title}</h3>
          <span class="text-xs bg-purple-900 text-purple-300 px-3 py-1 rounded-full">${p.difficulty || level}</span>
        </div>
        <p class="text-gray-400 mb-4">${p.description}</p>
        <div class="mb-3">
          <p class="text-sm text-purple-400 mb-2">🤖 AI Tools to Use:</p>
          <div class="flex flex-wrap gap-2">
            ${(p.aiToolsToUse || []).map(t => `<span class="text-xs bg-gray-800 text-gray-300 px-2 py-1 rounded-lg">${t}</span>`).join('')}
          </div>
        </div>
        <p class="text-sm text-gray-500">⏱ Est. ${p.estimatedDays || '7'} days</p>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('loading').classList.add('hidden');
    alert('Error! Please try again.');
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Generator - AI Learn</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">
<nav class="border-b border-gray-800 px-6 py-4 flex justify-between items-center">
  <a href="index.html" class="text-xl font-bold text-purple-400">🤖 AI Learn</a>
  <span class="text-gray-400 text-sm">Quiz Generator</span>
</nav>
<div class="max-w-2xl mx-auto px-6 py-12">
  <h2 class="text-3xl font-bold mb-2">🧠 Quiz Generator</h2>
  <p class="text-gray-400 mb-8">Auto-generate MCQs for any topic</p>
  <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 mb-6">
    <div class="mb-4">
      <label class="block text-sm text-gray-400 mb-2">Topic</label>
      <input id="topic" type="text" placeholder="e.g. Python, React, Data Structures"
        class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-500"/>
    </div>
    <div class="mb-6">
      <label class="block text-sm text-gray-400 mb-2">Level</label>
      <select id="level" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-500">
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
      </select>
    </div>
    <button onclick="generateQuiz()"
      class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-xl transition">
      Generate Quiz ✨
    </button>
  </div>
  <div id="loading" class="hidden text-center py-8">
    <div class="text-purple-400 text-lg">🤖 Generating your quiz...</div>
  </div>
  <div id="quizContainer" class="hidden space-y-4"></div>
  <div id="scoreContainer" class="hidden"></div>
</div>
<script>
let questions = [];
let selected = {};

async function generateQuiz() {
  const topic = document.getElementById('topic').value;
  const level = document.getElementById('level').value;
  if (!topic) { alert('Please enter a topic!'); return; }
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('quizContainer').classList.add('hidden');
  document.getElementById('scoreContainer').classList.add('hidden');
  try {
    const response = await fetch('https://my-n8n-wad4.onrender.com/webhook/quiz-generator', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic, level })
    });
    const data = await response.json();
    questions = data.data?.questions || [];
    selected = {};
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('quizContainer').classList.remove('hidden');
    renderQuiz();
  } catch(e) {
    document.getElementById('loading').classList.add('hidden');
    alert('Error! Please try again.');
  }
}

function renderQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = questions.map((q, i) => `
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
      <p class="font-semibold mb-4"><span class="text-purple-400">${i+1}.</span> ${q.question}</p>
      <div class="space-y-2">
        ${q.options.map((opt, j) => `
          <button onclick="selectAnswer(${i}, ${j})"
            id="opt-${i}-${j}"
            class="w-full text-left px-4 py-3 rounded-xl border border-gray-700 text-gray-300 hover:border-purple-500 transition">
            ${String.fromCharCode(65+j)}. ${opt}
          </button>
        `).join('')}
      </div>
    </div>
  `).join('') + `
    <button onclick="submitQuiz()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-xl transition">
      Submit Quiz
    </button>
  `;
}

function selectAnswer(qIdx, optIdx) {
  selected[qIdx] = optIdx;
  questions[qIdx].options.forEach((_, j) => {
    const btn = document.getElementById(`opt-${qIdx}-${j}`);
    btn.className = j === optIdx
      ? 'w-full text-left px-4 py-3 rounded-xl border border-purple-500 text-white transition'
      : 'w-full text-left px-4 py-3 rounded-xl border border-gray-700 text-gray-300 hover:border-purple-500 transition';
  });
}

function submitQuiz() {
  let score = 0;
  questions.forEach((q, i) => { if (selected[i] === q.correctIndex) score++; });
  document.getElementById('quizContainer').classList.add('hidden');
  const scoreContainer = document.getElementById('scoreContainer');
  scoreContainer.classList.remove('hidden');
  scoreContainer.innerHTML = `
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 text-center">
      <div class="text-5xl font-bold text-purple-400 mb-2">${score}/${questions.length}</div>
      <p class="text-gray-400 mb-6">${score >= 7 ? '🎉 Excellent!' : score >= 5 ? '👍 Good job!' : '📚 Keep practicing!'}</p>
    </div>
    <div class="space-y-4 mt-4">
      ${questions.map((q, i) => `
        <div class="bg-gray-900 border ${selected[i] === q.correctIndex ? 'border-green-700' : 'border-red-800'} rounded-2xl p-4">
          <p class="font-semibold mb-1"><span class="text-purple-400">${i+1}.</span> ${q.question}</p>
          <p class="text-green-400 text-sm">✅ ${q.options[q.correctIndex]}</p>
          ${selected[i] !== q.correctIndex ? `<p class="text-red-400 text-sm">❌ Your answer: ${q.options[selected[i]] || 'Not answered'}</p>` : ''}
          <p class="text-gray-500 text-sm mt-2">${q.explanation}</p>
        </div>
      `).join('')}
    </div>
    <button onclick="location.reload()" class="w-full mt-4 bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-xl transition">
      Try Another Quiz
    </button>
  `;
}
</script>
</body>
</html>
